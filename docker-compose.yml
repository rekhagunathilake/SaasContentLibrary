services:
  postgres:
    image: postgres:16-alpine
    container_name: scl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scl_user
      POSTGRES_PASSWORD: scluser@123
      POSTGRES_DB: scl_db
    ports:
      - "5433:5432"
    volumes:
      - scl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scl_user -d scl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scl-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: patience0112@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Vimukthi@123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - scl-pgadmin-data:/var/lib/pgadmin
    depends_on:
     postgres:
      condition: service_healthy

volumes:
  scl-postgres-data:
  scl-pgadmin-data: